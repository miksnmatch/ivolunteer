{% extends 'core/base.html' %}
{% block full_page %}
<div class="auth-page">
  <div class="auth-bg" style="background:linear-gradient(135deg,#2d5a3d,#4a7c5f)"></div>
  <div class="auth-panel">
    <div class="auth-inner">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#4a7c5f"/><path d="M12 26c0-4 3-7 8-7s8 3 8 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="20" cy="15" r="4" fill="#fff"/></svg>
        <span class="auth-logo-text">iVolunteer</span>
      </div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-sub">Enter your registered email to receive a reset link.</p>
      {% for message in messages %}<div class="alert alert-info"><i class="fas fa-info-circle"></i> {{ message }}</div>{% endfor %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-green btn-block btn-lg"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
      </form>
      <div class="auth-bottom"><a href="{% url 'login' %}" class="auth-link"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
    </div>
  </div>
</div>
{% endblock %}
