{% extends 'core/base.html' %}
{% block title %}Create Post{% endblock %}
{% block page_title %}Create Post{% endblock %}
{% block content %}
<div style="max-width:640px">
  <div class="card">
    <div class="card-body">
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:20px">New Forum Post</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">Category</label>
          <select name="category" class="form-control">{% for val,label in categories %}<option value="{{ val }}">{{ label }}</option>{% endfor %}</select>
        </div>
        <div class="form-group"><label class="form-label">Title</label><input type="text" name="title" class="form-control" placeholder="What's on your mind?" required maxlength="300"></div>
        <div class="form-group"><label class="form-label">Content</label><textarea name="content" class="form-control" rows="6" placeholder="Share your thoughts, questions, or experiences…" required></textarea></div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-green btn-lg"><i class="fas fa-paper-plane"></i> Post</button>
          <a href="{% url 'forum' %}" class="btn btn-grey btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
